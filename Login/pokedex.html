<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
        <link rel="stylesheet" href="../mystyle.css">
</head>
<body class="body">  
    <header>
        <div id="header-placeholder"></div>
    </header>

    <div>
        <label for="Name">Search by id</label>
            <input type ="number" id="idpokemon" name="pokemon">
        <button onclick="loadGeneration()">Search</button>

        <button onclick="loadGeneration('Deploy')">Deploy all pokemons</button>

    </div>
    <div id="pokedex"></div>
</body>
</html>

<script>
    async function loadGeneration(action) {
        const pokedexDiv = document.getElementById('pokedex');

        if (action === 'Deploy') {
            const response = await fetch('/api/pokemon');
            const pokemons = await response.json();
            pokedexDiv.innerHTML = pokemons.map(p => createPokemonCard(p)).join('');
        } else {
            const id = Number(document.querySelector("#idpokemon").value);
            if (!id) return; 

            const response = await fetch(`/api/pokemon/${id}`);
            const pokemon = await response.json();
            pokedexDiv.innerHTML = createPokemonCard(pokemon);
        }
    }

    function createPokemonCard(pokemon) {
        return `
            <div class="pokemon-card">
                <h3>#${pokemon.id} ${pokemon.name}</h3>
                <img src="${pokemon.sprite}" alt="${pokemon.name}">
                <p>Tipo: ${pokemon.type}</p>
                <p>HP: ${pokemon.stats.hp} | ATK: ${pokemon.stats.attack} | DEF: ${pokemon.stats.defense}</p>
            </div>
        `;
    }

    fetch('footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
    })

    fetch('nav-post-login.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })
</script>
