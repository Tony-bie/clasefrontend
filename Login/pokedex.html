<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
            <link rel="stylesheet" href="../mystyle.css">
</head>
<body class="body">  
    <header>
        <div id="header-placeholder"></div>
    </header>

    <div>
        <label for="Name">Search by id</label>
            <input type ="number" id="idpokemon" name="pokemon">
        <button onclick="loadGeneration()">Search</button>
        <button onclick="loadGeneration('gen1')">Gen 1</button>
        <button onclick="loadGeneration('gen2')">Gen 2</button>
        <button onclick="loadGeneration('gen3')">Gen 3</button>
    </div>
    <div id="pokedex"></div>
</body>
</html>

<script>
async function loadGeneration(gen){

    let start
    let end

    if(!gen){
        const id = Number(document.querySelector("#idpokemon").value)
        start = id
        end = id
    }

    if (gen == 'gen1'){
        start = 1
        end = 151
    }
    
    if(gen === 'gen2'){
        start = 152
        end = 251
    }

    if(gen === 'gen3'){
        start = 252
        end = 386
    }



    const URL = 'https://pokeapi.co/api/v2/pokemon/'

    let output = ''

    for(let id = start; id <= end; id++){

        const response = await fetch(`${URL}/${id}`)
        const pokemon = await response.json()

        const types = pokemon.types
        .map(t => t.type.name)
        .join(", ");

        output += `
        <div class="pokemon-card">
            <p>${id}. ${pokemon.name.toUpperCase()}</p>
            <img src="${pokemon.sprites.front_default}">
            <p>Type: ${types}</p>
        </div>
        `
    }

    document.getElementById("pokedex").innerHTML = output
}

    fetch('footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
    })

    fetch('nav-post-login.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })
</script>
