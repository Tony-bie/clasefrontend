<!DOCTYPE html>
<html lang="en">
        <link rel="stylesheet" href="../mystyle.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="body">
    <header>
        <div id="header-placeholder"></div>
    </header>
    <div>
        <h1>Login successful</h1>
    </div>
    <img id="pokemon_image" alt = "pokemon"></img>
    <div id="pokemon_name"></div>
    <footer>
        <div id="footer-placeholder"></div>
    </footer>
</body>
</html>

<script>
    fetch('footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
    })

    fetch('nav-post-login.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })

    
    reicive_pokemon()

    async function reicive_pokemon() {
    const URL = "https://pokeapi.co/api/v2/pokemon/charizard"
      fetch(URL, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
            })
            .then(answer => answer.json())
            .then(data => {
                let pokemonName  = data.name || "";
                let pokemonImage = data.sprites?.front_default  || "";

                document.getElementById('pokemon_name').textContent = pokemonName;
                document.getElementById('pokemon_image').src = pokemonImage;
            })
            .catch(error => console.log(error));     
}
    
</script>
